const DEFAULT_SCORING = {correct:1, wrong:0, noAnswer:0};
const CATEGORIES =["Geografia","Storia","Matematica","Musica","Scienze","Cinema","Sport","Serie TV","Tecnologia","Videogiochi","Filosofia","Arte","Letteratura","Attualità e Società","Natura e Animali","Mitologia","Food e Bevande","Moda e Costume","Fumetti e Anime","Cartoni Animati e Disney","Curiosità e Record"];
/* Le domande giocate in una partita vivono in state.gameQuestions (pescate dal
   mazzo Firebase all'avvio di ogni fase). Q1/Q2/QF restano solo come mazzo
   "di partenza" con cui popolare il database la prima volta che l'app parte
   a banca dati vuota (vedi ensureSeedQuestions). */
function getList(round){
  const gq = state && state.gameQuestions;
  if(!gq) return [];
  if(round===1) return gq.round1 || [];
  if(round===2) return gq.round2 || [];
  if(round==='final') return gq.final || [];
  if(round==='tiebreak') return gq.tiebreak ? [gq.tiebreak] : [];
  return [];
}
function getQuestion(round, idx){ return getList(round)[idx]; }
function qkey(round, idx){ return round+'-'+idx; }

/* ================== STORAGE HELPERS (Firebase Realtime Database) ==================
   Qui sotto sostituiamo "window.storage" (che funziona solo dentro Claude.ai)
   con Firebase, che funziona da qualunque hosting, incluso GitHub Pages.

   *** DEVI INCOLLARE QUI LA TUA CONFIGURAZIONE FIREBASE ***
   La trovi nella console Firebase seguendo la guida che ti ho scritto in chat.
*/
const firebaseConfig = {
  apiKey: "AIzaSyAjJ6LLpzw-5jAhqaCzhkJaL4p5aTuRo7Q",
  authDomain: "quizzettone-49543.firebaseapp.com",
  databaseURL: "https://quizzettone-49543-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "quizzettone-49543",
  storageBucket: "quizzettone-49543.firebasestorage.app",
  messagingSenderId: "503932476992",
  appId: "1:503932476992:web:2b14ecd90cd6a2a2f609a5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const DB_ROOT = 'quizzettone'; // tutti i dati del gioco vivono sotto questo "nodo" del database

async function safeGet(key, shared){
  try{
    const snap = await db.ref(DB_ROOT + '/' + key).once('value');
    const val = snap.val();
    return (val === null || val === undefined) ? null : val;
  } catch(e){ console.error('storage get failed', key, e); return null; }
}
async function safeSet(key, value, shared){
  try{ await db.ref(DB_ROOT + '/' + key).set(value); return true; }
  catch(e){ console.error('storage set failed', key, e); return false; }
}
async function safeDelete(key, shared){
  try{ await db.ref(DB_ROOT + '/' + key).remove(); }catch(e){}
}
async function safeList(prefix, shared){
  try{
    const snap = await db.ref(DB_ROOT).once('value');
    const all = snap.val() || {};
    return Object.keys(all).filter(k => k.startsWith(prefix));
  } catch(e){ console.error('storage list failed', prefix, e); return []; }
}

/* ================== APP STATE (locale) ================== */
let role = null;          // 'admin' | 'team'
let teamId = null;
let teamName = null;
let joined = false;
let listening = false;
let uiTickTimer = null;
let connected = true;     // stato connessione Firebase (.info/connected)

let state = null;         // stato di gioco condiviso
let teams = {};           // id -> {id, name}
let answersByTeam = {};   // id -> {qkey: {optionIndex, ts}}
let overridesByTeam = {}; // id -> {qkey: points}
let questionBank = {};    // id -> domanda (persiste tra una partita e l'altra)
let showQuestionManager = false; // toggle locale (solo per questo admin), non condiviso
let scoringDefaults = DEFAULT_SCORING; // punteggio di default, persiste tra le partite
let showScoringSettings = false; // toggle locale (solo per questo admin), non condiviso

function defaultState(){
  return {
    phase:'lobby', round:1, qIndex:0,
    questionStartedAt:null, timerDuration:20000,
    checkpoint:null, checkpointMode:null,
    finalists:null, eliminated:null,
    tiebreak:null, winner:null, finalWinnerScoreSnapshot:null,
    standingsVisible:false, gameQuestions:null, solutionRevealed:false, scoringOverrides:{}, standingsReveal:null
  };
}

/* Un solo listener realtime su tutto il nodo del gioco, al posto del polling
   ogni 1.1s: Firebase applica gli aggiornamenti in locale in modo pressoché
   istantaneo, anche per le scritture fatte da questo stesso client. */
function startListening(){
  if(listening) return;
  listening = true;
  db.ref(DB_ROOT).on('value', snap=>{
    const all = snap.val() || {};
    const newTeams = {}, newAnswers = {}, newOverrides = {}, newQuestionBank = {};
    Object.keys(all).forEach(k=>{
      if(k.startsWith('teaminfo:')){ if(all[k]) newTeams[all[k].id] = all[k]; }
      else if(k.startsWith('answers:')){ newAnswers[k.slice('answers:'.length)] = all[k] || {}; }
      else if(k.startsWith('overrides:')){ newOverrides[k.slice('overrides:'.length)] = all[k] || {}; }
      else if(k.startsWith('question:')){ if(all[k]) newQuestionBank[all[k].id] = all[k]; }
    });
    teams = newTeams;
    answersByTeam = newAnswers;
    overridesByTeam = newOverrides;
    questionBank = newQuestionBank;
    scoringDefaults = all.scoringDefaults || DEFAULT_SCORING;
    state = all.state || defaultState();
    if(role==='admin') ensureSeedQuestions();
    render();
  }, err=>{ console.error('listener fallito', err); });
  db.ref('.info/connected').on('value', snap=>{
    connected = snap.val() === true;
    render();
  });
  startUiTick();
}
function stopListening(){
  db.ref(DB_ROOT).off('value');
  db.ref('.info/connected').off('value');
  listening = false;
  if(uiTickTimer){ clearInterval(uiTickTimer); uiTickTimer = null; }
}
function startUiTick(){
  if(uiTickTimer) return;
  uiTickTimer = setInterval(()=>{ if(state && state.phase==='question') render(); }, 250);
}
async function refresh(){ render(); }

/* ================== LOGICA PUNTEGGI ================== */
function scoringFor(round, idx){
  const key = qkey(round, idx);
  const override = state && state.scoringOverrides && state.scoringOverrides[key];
  return override || scoringDefaults || DEFAULT_SCORING;
}
function pointsForAnswer(round, idx, optionIndex){
  const q = getQuestion(round, idx);
  if(!q) return 0;
  const sc = scoringFor(round, idx);
  return optionIndex === q.correctIndex ? sc.correct : sc.wrong;
}
function teamPointsForQuestion(id, round, idx){
  const key = qkey(round, idx);
  const ov = overridesByTeam[id] && overridesByTeam[id][key];
  if(ov !== undefined && ov !== null) return ov;
  const ans = answersByTeam[id] && answersByTeam[id][key];
  if(!ans) return scoringFor(round, idx).noAnswer;
  return pointsForAnswer(round, idx, ans.optionIndex);
}
function roundScore(id, round){
  const list = getList(round);
  let sum = 0;
  for(let i=0;i<list.length;i++) sum += teamPointsForQuestion(id, round, i);
  return sum;
}
function qualificationScore(id){ return roundScore(id,1) + roundScore(id,2); }
function totalScore(id){ return qualificationScore(id) + roundScore(id,'final'); }

/* ================== BANCA DOMANDE (Firebase, persiste tra le partite) ================== */
function newQuestionId(){ return 'q_' + Math.random().toString(36).slice(2,10); }

async function addQuestion(q){
  const id = newQuestionId();
  const entry = {id, pool:q.pool, category:q.category, question:q.question, options:q.options, correctIndex:q.correctIndex, adminNote:q.adminNote||null, lastUsedAt:null};
  await safeSet('question:'+id, entry, true);
  return id;
}

function parseBulkQuestions(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const parsed = [], errors = [];
  lines.forEach((line, i)=>{
    const parts = line.split('|').map(p=>p.trim());
    if(parts.length<7){ errors.push('Riga '+(i+1)+': mancano dei campi (servono almeno 7 valori separati da "|")'); return; }
    const [pool, category, question, o1,o2,o3,o4, correctRaw, note] = parts;
    if(pool!=='manche' && pool!=='finale'){ errors.push('Riga '+(i+1)+': il pool deve essere "manche" o "finale"'); return; }
    const correct = parseInt(correctRaw, 10);
    if(!correct || correct<1 || correct>4){ errors.push('Riga '+(i+1)+': la colonna della risposta corretta deve essere 1, 2, 3 o 4'); return; }
    if(!category || !question || !o1 || !o2 || !o3 || !o4){ errors.push('Riga '+(i+1)+': un campo obbligatorio è vuoto'); return; }
    parsed.push({pool, category, question, options:[o1,o2,o3,o4], correctIndex:correct-1, adminNote: note || null});
  });
  return {parsed, errors};
}
async function bulkAddQuestions(list){
  const updates = {};
  list.forEach(q=>{
    const id = newQuestionId();
    updates['question:'+id] = {id, pool:q.pool, category:q.category, question:q.question, options:q.options, correctIndex:q.correctIndex, adminNote:q.adminNote, lastUsedAt:null};
  });
  await db.ref(DB_ROOT).update(updates);
}

/* La prima volta che un admin si collega a banca dati vuota, la popoliamo con
   le domande "storiche" (quelle che prima erano fisse nel codice), così il
   gioco resta uguale a prima finché non se ne aggiungono di nuove. */
let seedAttempted = false;
async function ensureSeedQuestions(){
  if(seedAttempted) return;
  seedAttempted = true;
  const existing = await safeList('question:', true);
  if(existing.length>0) return;
  const updates = {};

    updates['question:'+id] = {id, pool, category:q.category, question:q.question, options:q.options, correctIndex:q.correctIndex, adminNote:q.adminNote||null, lastUsedAt:null};
  });
  seed(Q1, 'manche'); seed(Q2, 'manche'); seed(QF, 'finale');
  await db.ref(DB_ROOT).update(updates);
}

/* Pesca "count" domande da un pool, ruotando tra le categorie presenti e
   preferendo sempre quelle usate da più tempo (o mai usate). Se il mazzo ha
   meno domande di quelle richieste, restituisce solo quelle disponibili
   invece di ripeterne qualcuna nella stessa partita. */
function drawQuestionsForGame(pool, count, excludeIds){
  excludeIds = excludeIds || [];
  const candidates = Object.values(questionBank).filter(q=>q.pool===pool && !excludeIds.includes(q.id));
  const byCategory = {};
  candidates.forEach(q=>{ (byCategory[q.category] = byCategory[q.category] || []).push(q); });
  Object.values(byCategory).forEach(arr=> arr.sort((a,b)=> (a.lastUsedAt||0) - (b.lastUsedAt||0)) );
  const categories = Object.keys(byCategory).sort(()=>Math.random()-0.5);
  const picked = [], pickedIds = new Set();
  let progress = true;
  while(picked.length<count && progress){
    progress = false;
    for(const cat of categories){
      if(picked.length>=count) break;
      const next = byCategory[cat].find(q=>!pickedIds.has(q.id));
      if(next){ picked.push(next); pickedIds.add(next.id); progress = true; }
    }
  }
  return picked.sort(()=>Math.random()-0.5);
}
async function markQuestionsUsed(questions){
  if(!questions.length) return;
  const updates = {};
  const now = Date.now();
  questions.forEach(q=>{ updates['question:'+q.id+'/lastUsedAt'] = now; });
  await db.ref(DB_ROOT).update(updates);
}

async function adminNextQuestion(){
  const round = state.round, idx = state.qIndex;
  const list = getList(round);
  const qNumber = idx+1;
  if(round===1 || round===2){
    const midPoint = Math.ceil(list.length/2);
    if(list.length>=4 && qNumber===midPoint){
      await safeSet('state', {...state, phase:'checkpoint', checkpoint:{type:'mid', round}, checkpointMode:null}, true);
    } else if(qNumber===list.length){
      await safeSet('state', {...state, phase:'checkpoint', checkpoint:{type:'end', round}, checkpointMode:null}, true);
    } else {
      await safeSet('state', {...state, qIndex:idx+1, phase:'question', questionStartedAt:Date.now(), solutionRevealed:false}, true);
    }
  } else if(round==='final'){
    if(qNumber===list.length){
      await safeSet('state', {...state, phase:'final_ready'}, true);
    } else {
      await safeSet('state', {...state, qIndex:idx+1, phase:'question', questionStartedAt:Date.now(), solutionRevealed:false}, true);

  } else if(round==='tiebreak'){

async function adminRevealFinalists(){
  const ids = Object.keys(teams);
  const ranked = ids.map(id=>({id, score:qualificationScore(id)})).sort((a,b)=>b.score-a.score);
  if(ranked.length<=2){
    await safeSet('state', {...state, phase:'reveal_finalists', finalists:ranked.map(r=>r.id), eliminated:[]}, true);
    await refresh(); return;
  }
  const secondScore = ranked[1].score;
  const tiedForSecond = ranked.filter(r=>r.score===secondScore);
  if(tiedForSecond.length>1 && ranked[0].score!==secondScore){
    // primo posto chiaro, spareggio per il secondo posto
    const candidateQuestions = drawQuestionsForGame('finale', 5);
    await safeSet('state', {...state, phase:'tiebreak_setup', tiebreak:{qualifiedSoFar:[ranked[0].id], candidates: tiedForSecond.map(r=>r.id), candidateQuestions, question:null, qIndex:null}}, true);
  } else if(ranked[0].score===secondScore){
    // pareggio anche per il primo posto: tutti i pari merito in spareggio, si prendono i primi 2
    const topScore = ranked[0].score;
    const tiedTop = ranked.filter(r=>r.score===topScore).map(r=>r.id);
    const candidateQuestions = drawQuestionsForGame('finale', 5);
    await safeSet('state', {...state, phase:'tiebreak_setup', tiebreak:{qualifiedSoFar:[], candidates: tiedTop, candidateQuestions, question:null, qIndex:null}}, true);
  } else {
    await safeSet('state', {...state, phase:'reveal_finalists', finalists:[ranked[0].id, ranked[1].id], eliminated: ranked.slice(2).map(r=>r.id)}, true);
  }
  await refresh();
}

  const tb = {...state.tiebreak, question: chosen, qIndex:qIdx};
  await safeSet('state', {...state, round:'tiebreak', qIndex:0, phase:'question', questionStartedAt:Date.now(), solutionRevealed:false, tiebreak: tb, gameQuestions:{...state.gameQuestions, tiebreak: chosen}}, true);

/* ================== SESSIONE (URL + localStorage) ==================
   L'URL mantiene la sessione se ricarichi la pagina; localStorage la
   recupera anche se il browser viene chiuso del tutto (l'URL con i
   parametri va perso, ma il dispositivo è lo stesso). */
const LS_TEAM_KEY = 'quizzettone_team';
const LS_ADMIN_KEY = 'quizzettone_admin_unlocked';
const ADMIN_PIN = '2468'; // cambia questo codice per proteggere l'ingresso admin
function saveTeamSession(id, name){
  try{ localStorage.setItem(LS_TEAM_KEY, JSON.stringify({id, name})); }catch(e){}
}
function loadTeamSession(){
  try{ return JSON.parse(localStorage.getItem(LS_TEAM_KEY)); }catch(e){ return null; }
}
function clearTeamSession(){
  try{ localStorage.removeItem(LS_TEAM_KEY); }catch(e){}
}
function isAdminUnlocked(){
  try{ return localStorage.getItem(LS_ADMIN_KEY)==='1'; }catch(e){ return false; }
}
function setAdminUnlocked(){
  try{ localStorage.setItem(LS_ADMIN_KEY, '1'); }catch(e){}
}
function setUrlSession(r, id){
  const url = new URL(window.location.href);
  url.searchParams.set('role', r);
  if(id) url.searchParams.set('id', id); else url.searchParams.delete('id');
  window.history.replaceState({}, '', url.toString());
}
function clearUrlSession(){
  const url = new URL(window.location.href);
  url.searchParams.delete('role'); url.searchParams.delete('id');
  window.history.replaceState({}, '', url.toString());
}
async function restoreFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const r = params.get('role');
  const id = params.get('id');
  if(r==='admin'){
    if(!isAdminUnlocked()){ renderAdminPinEntry(); return true; }
    role = 'admin';
    startListening();
    return true;
  }
  if(r==='team' && id){
    const info = await safeGet('teaminfo:'+id, true);
    if(info){
      role = 'team'; teamId = info.id; teamName = info.name; joined = true;
      saveTeamSession(teamId, teamName);
      startListening();
      return true;
    } else {
      clearUrlSession();
    }
  }
  // Nessuna sessione nell'URL: prova a recuperarla da localStorage
  // (es. il browser è stato chiuso del tutto e poi riaperto).
  const saved = loadTeamSession();
  if(saved && saved.id){
    const info = await safeGet('teaminfo:'+saved.id, true);
    if(info){
      role = 'team'; teamId = info.id; teamName = info.name; joined = true;
      setUrlSession('team', teamId);
      startListening();
      return true;
    } else {
      clearTeamSession();
    }
  }
  return false;
}
async function teamSubmitAnswer(round, idx, optionIndex){
  const key = qkey(round, idx);
  const current = await safeGet('answers:'+teamId, true) || {};
  if(current[key]) return; // già risposto
  current[key] = {optionIndex, ts: Date.now()};
  await safeSet('answers:'+teamId, current, true);
  await refresh();
}

/* ================== HELPERS UI ================== */
function letter(i){ return ['A','B','C','D'][i]; }
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function timeRemaining(){
  if(!state || !state.questionStartedAt) return 0;
  const elapsed = Date.now() - state.questionStartedAt;
  return Math.max(0, state.timerDuration - elapsed);
}
function circleTimer(remainingMs, total){
  const pct = Math.max(0, Math.min(1, remainingMs/total));
  const r = 52, c = 2*Math.PI*r;
  const urgent = remainingMs < 6000;
  return `<div class="timer ${urgent?'urgent':''}">
    <svg width="118" height="118" viewBox="0 0 118 118">
      <circle cx="59" cy="59" r="${r}" fill="none" stroke="rgba(245,241,255,.12)" stroke-width="8"/>
      <circle cx="59" cy="59" r="${r}" fill="none" stroke="${urgent?'#FF4D6D':'#F2B705'}" stroke-width="8"
        stroke-dasharray="${c}" stroke-dashoffset="${c*(1-pct)}" stroke-linecap="round"/>
    </svg>
    <div class="timer-num">${Math.ceil(remainingMs/1000)}</div>
  </div>`;
}
function rankRows(idsWithScores){
  return idsWithScores.map((r,i)=>`
    <div class="rank-row ${i===0?'top1':i===1?'top2':i===2?'top3':''}">
      <div class="rank-num">${i+1}</div>
      <div class="rank-name">${teams[r.id] ? teams[r.id].name : '—'}</div>
      <div class="rank-score">${r.score} pt</div>
    </div>`).join('');

function activeTeamsForRound(round){

function renderTeamQuestion(round, idx, active, isTiebreak){
  const q = getQuestion(round, idx);
  if(!q) return '<div class="card center">Un attimo...</div>';
  const key = qkey(round, idx);
  const myAnswer = answersByTeam[teamId] && answersByTeam[teamId][key];
  const remaining = active ? timeRemaining() : 0;
  const expired = active && remaining<=0 && !myAnswer;
  const showCorrectness = round!=='tiebreak' && !active && !!state.solutionRevealed;

  let optionsHtml = q.options.map((opt,i)=>{
    let cls = 'opt';
    if(myAnswer && myAnswer.optionIndex===i) cls += ' selected';
    if(showCorrectness){
      if(i===q.correctIndex) cls += ' correct';
      else if(myAnswer && myAnswer.optionIndex===i && i!==q.correctIndex) cls += ' wrong';
    }
    const disabled = !active || !!myAnswer || remaining<=0;
    return `<button class="${cls}" data-idx="${i}" ${disabled?'disabled':''}>
      <span class="letter">${letter(i)}</span><span>${escapeHtml(opt)}</span>
    </button>`;
  }).join('');

  let banner = '';
  if(myAnswer) banner = `<div class="status-banner sent">✓ Risposta inviata</div>`;
  else if(expired || (!active && !myAnswer)) banner = `<div class="status-banner expired">⏱ Tempo scaduto</div>`;

  const roundLabel = round==='final' ? 'FINALE' : round==='tiebreak' ? 'SPAREGGIO' : `MANCHE ${round}`;
  const activeIds = active ? activeTeamsForRound(round) : [];
  const answeredCount = active ? activeIds.filter(id=>answersByTeam[id] && answersByTeam[id][key]).length : 0;

  return `
    <div class="card stack">
      <div class="qmeta">
        <span class="pill gold">${roundLabel}</span>
        <span class="pill">Domanda ${idx+1}/${getList(round).length}</span>
        <span class="pill">${escapeHtml(q.category)}</span>
        ${active ? `<span class="pill">✓ ${answeredCount}/${activeIds.length} risposto</span>` : ''}
      </div>
      ${active ? `<div class="timer-wrap">${circleTimer(remaining, state.timerDuration)}</div>` : ''}
      <div class="qtext">${escapeHtml(q.question)}</div>
      <div class="options">${optionsHtml}</div>
      ${banner}
    </div>
  `;
}

function attachTeamOptionHandlers(){
  document.querySelectorAll('.opt[data-idx]').forEach(btn=>{
    btn.onclick = async ()=>{
      if(btn.disabled) return;
      const idx = parseInt(btn.getAttribute('data-idx'));
      const round = state.round, qIdx = state.qIndex;
      await teamSubmitAnswer(round, qIdx, idx);
    };
  });
}

function renderProvisionalStandings(round){
  const ids = Object.keys(teams);
  const ranked = ids.map(id=>({id, score: roundScore(id, round)})).sort((a,b)=>b.score-a.score);
  return `<div class="divider"></div><h3 class="center">Classifica provvisoria</h3>${rankRows(ranked)}`;
}
function renderEndRound1Standings(mode){
  const ids = Object.keys(teams);
  const ranked = ids.map(id=>({id, score: roundScore(id,1)})).sort((a,b)=>b.score-a.score);
  if(mode==='complete') return `<div class="divider"></div><h3 class="center">Classifica Manche 1</h3>${rankRows(ranked)}`;
  if(mode==='partial') return `<div class="divider"></div><h3 class="center">Posizioni (punti nascosti)</h3>${ranked.map((r,i)=>`<div class="rank-row"><div class="rank-num">${i+1}</div><div class="rank-name">${teams[r.id]?teams[r.id].name:'—'}</div></div>`).join('')}`;
  return '';
}

        <p class="muted" style="margin:2px 0 0;">Corretta ${scoringDefaults.correct} · Sbagliata ${scoringDefaults.wrong} · Non data ${scoringDefaults.noAnswer}</p>
      </div>
      <button class="btn secondary" id="btnToggleScoringSettings" style="flex:1;">${showScoringSettings?'Nascondi':'Modifica default'}</button>
    </div>`;
  const scoringSettingsPanel = showScoringSettings ? `
    <div class="card stack">
      <h3>Punteggio di default per tutte le domande</h3>
      <p class="note">Vale per ogni domanda, a meno che tu non lo cambi per una domanda specifica mentre è in corso.</p>
      <div class="row">
        <label class="stack">Corretta<input type="text" inputmode="numeric" id="scDefCorrect" value="${scoringDefaults.correct}"></label>
        <label class="stack">Sbagliata (malus)<input type="text" inputmode="numeric" id="scDefWrong" value="${scoringDefaults.wrong}"></label>
        <label class="stack">Non data<input type="text" inputmode="numeric" id="scDefNoAnswer" value="${scoringDefaults.noAnswer}"></label>
      </div>
      <button class="btn" id="btnSaveScoringDefaults">Salva default</button>
    </div>` : '';

  const app2 = document.getElementById('app');
  app2.innerHTML = `
    <div class="header">
      <div class="eyebrow">Quizzettone · Pannello Admin</div>
      ${connectionBadge()}
    </div>
    ${standingsToggle}
    ${standingsRevealPanel}
    ${controlPanel}
    ${liveTable}
    ${globalStandings}
    ${questionManagerToggle}
    ${showQuestionManager ? renderQuestionManager() : ''}
    ${scoringSettingsToggle}
    ${scoringSettingsPanel}
    <div class="row">
      <button class="btn ghost small" id="btnReset">↺ Reset partita</button>
      <button class="btn ghost small" id="btnExitAdmin">Esci da admin</button>
    </div>
  `;
  attachAdminHandlers();
  const exitAdmin = document.getElementById('btnExitAdmin');
  if(exitAdmin) exitAdmin.onclick = ()=>{ clearUrlSession(); stopListening(); role=null; renderRoleSelect(); };
}

function renderQuestionManager(){
  const all = Object.values(questionBank);
  const pools = ['manche','finale'];
  const byPoolCategory = {};
  all.forEach(q=>{
    byPoolCategory[q.pool] = byPoolCategory[q.pool] || {};
    byPoolCategory[q.pool][q.category] = byPoolCategory[q.pool][q.category] || [];
    byPoolCategory[q.pool][q.category].push(q);
  });

  const countsHtml = pools.map(pool=>{
    const cats = byPoolCategory[pool] || {};
    const catNames = Object.keys(cats).sort();
    const rows = catNames.map(c=>{
      const n = cats[c].length;
      return `<div class="row" style="justify-content:space-between;"><span>${escapeHtml(c)}</span><span class="pill ${n<10?'':'gold'}">${n}</span></div>`;
    }).join('') || '<p class="muted">Nessuna domanda in questo pool.</p>';
    const total = all.filter(q=>q.pool===pool).length;
    return `<div class="stack"><h3>${pool==='manche'?'Manche':'Finale'} (${total} totali)</h3>${rows}</div>`;
  }).join('<div class="divider"></div>');

  const listHtml = pools.map(pool=>{
    const cats = byPoolCategory[pool] || {};
    const catNames = Object.keys(cats).sort();
    const details = catNames.map(c=>{
      const items = cats[c].map(q=>`
        <div class="row" style="align-items:center;">
          <div style="flex:3;">
            <div style="font-weight:600;">${escapeHtml(q.question)}</div>
            <div class="muted" style="font-size:12px;">${q.options.map((o,i)=>(i===q.correctIndex?'✓ ':'')+escapeHtml(o)).join(' · ')}</div>
          </div>
          <button class="btn danger small" data-delete-question="${q.id}">Elimina</button>
        </div>`).join('');
      return `<details><summary>${escapeHtml(c)} (${cats[c].length})</summary>${items}</details>`;
    }).join('') || '<p class="muted">Vuoto.</p>';
    return `<div class="stack"><h3>${pool==='manche'?'Manche':'Finale'}</h3>${details}</div>`;
  }).join('<div class="divider"></div>');

  return `
    <div class="card stack">
      <h3>Riepilogo mazzo</h3>
      <p class="note">Le categorie sotto le 10 domande sono evidenziate in oro: potrebbero ripetersi spesso finché non ne aggiungi altre.</p>
      ${countsHtml}
    </div>
    <div class="card stack">
      <h3>Aggiungi una domanda</h3>
      <div class="row">
        <select id="qmPool">
          <option value="manche">Manche</option>
          <option value="finale">Finale</option>
        </select>
        <select id="qmCategory">${CATEGORIES.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('')}</select>
      </div>
      <input type="text" id="qmQuestion" placeholder="Testo della domanda">
      <input type="text" id="qmOpt0" placeholder="Opzione A">
      <input type="text" id="qmOpt1" placeholder="Opzione B">
      <input type="text" id="qmOpt2" placeholder="Opzione C">
      <input type="text" id="qmOpt3" placeholder="Opzione D">
      <select id="qmCorrect">
        <option value="0">Corretta: A</option>
        <option value="1">Corretta: B</option>
        <option value="2">Corretta: C</option>
        <option value="3">Corretta: D</option>
      </select>
      <input type="text" id="qmNote" placeholder="Nota per l'admin (facoltativa, es. autore canzone)">
      <button class="btn" id="btnAddQuestion">Aggiungi al mazzo</button>
      <div id="qmAddMsg" class="note"></div>
    </div>
    <div class="card stack">
      <h3>Incolla in blocco</h3>
      <p class="note">Un rigo per domanda, campi separati da "|":<br>
      <code>manche|Musica|Che canzone è?|Sere nere|Ti scatterò una foto|Non me lo so spiegare|Imbranato|2|Tiziano Ferro</code><br>
      Il penultimo campo è la risposta corretta (1=A, 2=B, 3=C, 4=D); l'ultimo campo (nota) è facoltativo.</p>
      <textarea id="qmBulkText" rows="6" placeholder="Incolla qui le domande, una per riga..."></textarea>
      <button class="btn" id="btnBulkImport">Importa</button>
      <div id="qmBulkMsg" class="note"></div>
    </div>
    <div class="card stack">
      <h3>Elenco domande</h3>
      ${listHtml}
    </div>
  `;
}

function renderAdminStandings(round, qualification){
  const ids = Object.keys(teams);
  const ranked = ids.map(id=>({id, score: qualification? qualificationScore(id) : roundScore(id, round)})).sort((a,b)=>b.score-a.score);
  return `<h3 class="center">${qualification?'Classifica qualificazione':'Classifica Manche '+round}</h3>${rankRows(ranked)}`;
}

function attachAdminHandlers(){
  const byId = id=>document.getElementById(id);
  if(byId('btnStart')) byId('btnStart').onclick = adminStartGame;
  if(byId('btnCloseNow')) byId('btnCloseNow').onclick = adminCloseAnswers;
  if(byId('btnRevealSolution')) byId('btnRevealSolution').onclick = adminRevealSolution;
  if(byId('btnNext')) byId('btnNext').onclick = adminNextQuestion;
  if(byId('btnContinue')) byId('btnContinue').onclick = adminContinueFromCheckpoint;
  if(byId('btnModePause')) byId('btnModePause').onclick = ()=>adminSetCheckpointMode('pause');
  if(byId('btnModeClassifica')) byId('btnModeClassifica').onclick = ()=>adminSetCheckpointMode('classifica');
  if(byId('btnModeComplete')) byId('btnModeComplete').onclick = ()=>adminSetCheckpointMode('complete');
  if(byId('btnModeMessage')) byId('btnModeMessage').onclick = ()=>adminSetCheckpointMode('message');
  if(byId('btnModePartial')) byId('btnModePartial').onclick = ()=>adminSetCheckpointMode('partial');
  if(byId('btnRevealFinalists')) byId('btnRevealFinalists').onclick = adminRevealFinalists;
  if(byId('btnGoFinal')) byId('btnGoFinal').onclick = adminContinueToFinal;
  if(byId('btnRevealWinner')) byId('btnRevealWinner').onclick = adminRevealWinner;
  if(byId('btnReset')) byId('btnReset').onclick = ()=>{ if(confirm('Sicuro di voler azzerare tutta la partita?')) adminResetGame(); };
  if(byId('btnToggleStandings')) byId('btnToggleStandings').onclick = adminToggleStandings;
  if(byId('btnSetupStandingsReveal')) byId('btnSetupStandingsReveal').onclick = adminSetupStandingsReveal;
  if(byId('btnRevealNextStanding')) byId('btnRevealNextStanding').onclick = adminRevealNextStanding;
  if(byId('btnCloseStandingsReveal')) byId('btnCloseStandingsReveal').onclick = adminCloseStandingsReveal;
  document.querySelectorAll('[data-move-reveal]').forEach(btn=>{
    btn.onclick = ()=> adminMoveStandingsRevealOrder(parseInt(btn.getAttribute('data-move-reveal')), parseInt(btn.getAttribute('data-dir')));
  });
  if(byId('btnToggleQuestionManager')) byId('btnToggleQuestionManager').onclick = ()=>{ showQuestionManager = !showQuestionManager; render(); };
  if(byId('btnToggleScoringSettings')) byId('btnToggleScoringSettings').onclick = ()=>{ showScoringSettings = !showScoringSettings; render(); };
  if(byId('btnSaveScoringDefaults')) byId('btnSaveScoringDefaults').onclick = ()=>{
    const correct = parseInt(byId('scDefCorrect').value, 10) || 0;
    const wrong = parseInt(byId('scDefWrong').value, 10) || 0;
    const noAnswer = parseInt(byId('scDefNoAnswer').value, 10) || 0;
    adminSetScoringDefaults({correct, wrong, noAnswer});
  };
  if(byId('btnApplyQuestionScoring')) byId('btnApplyQuestionScoring').onclick = ()=>{
    const correct = parseInt(byId('qsCorrect').value, 10) || 0;
    const wrong = parseInt(byId('qsWrong').value, 10) || 0;
    const noAnswer = parseInt(byId('qsNoAnswer').value, 10) || 0;
    adminSetQuestionScoring(state.round, state.qIndex, {correct, wrong, noAnswer});
  };
  if(byId('btnAddQuestion')) byId('btnAddQuestion').onclick = async ()=>{
    const pool = byId('qmPool').value;
    const category = byId('qmCategory').value;
    const question = byId('qmQuestion').value.trim();
    const opts = [byId('qmOpt0').value.trim(), byId('qmOpt1').value.trim(), byId('qmOpt2').value.trim(), byId('qmOpt3').value.trim()];
    const correctIndex = parseInt(byId('qmCorrect').value, 10);
    const note = byId('qmNote').value.trim();
    const msg = byId('qmAddMsg');
    if(!question || opts.some(o=>!o)){
      msg.textContent = 'Compila la domanda e tutte e 4 le opzioni.';
      msg.style.color = 'var(--pink)';
      return;
    }
    await addQuestion({pool, category, question, options:opts, correctIndex, adminNote: note||null});
    msg.textContent = 'Domanda aggiunta!';
    msg.style.color = 'var(--green)';
    ['qmQuestion','qmOpt0','qmOpt1','qmOpt2','qmOpt3','qmNote'].forEach(id=>byId(id).value='');
  };
  if(byId('btnBulkImport')) byId('btnBulkImport').onclick = async ()=>{
    const text = byId('qmBulkText').value;
    const {parsed, errors} = parseBulkQuestions(text);
    if(parsed.length>0) await bulkAddQuestions(parsed);
    const msg = byId('qmBulkMsg');
    let text2 = parsed.length + ' domande importate.';
    if(errors.length) text2 += ' Problemi: ' + errors.join('; ');
    msg.textContent = text2;
    msg.style.color = errors.length ? 'var(--pink)' : 'var(--green)';
    if(parsed.length>0) byId('qmBulkText').value = '';
  };
  document.querySelectorAll('[data-delete-question]').forEach(btn=>{
    btn.onclick = ()=>{ if(confirm('Eliminare questa domanda dal mazzo?')) deleteQuestion(btn.getAttribute('data-delete-question')); };
  });
  document.querySelectorAll('[data-adjust]').forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.getAttribute('data-team');
      const delta = parseInt(btn.getAttribute('data-adjust'));
      adminAdjustPoints(id, state.round, state.qIndex, delta);
    };
  });
  document.querySelectorAll('[data-tb-q]').forEach(btn=>{
    btn.onclick = ()=> adminStartTiebreakQuestion(parseInt(btn.getAttribute('data-tb-q')));
  });
  document.querySelectorAll('[data-assign-winner]').forEach(btn=>{
    btn.onclick = ()=> adminAssignTiebreakWinner(btn.getAttribute('data-assign-winner'));
  });
  document.querySelectorAll('[data-declare]').forEach(btn=>{
    btn.onclick = ()=> adminDeclareWinnerManually(btn.getAttribute('data-declare'));
  });
}

/* ================== AVVIO ================== */
(async function boot(){
  const restored = await restoreFromUrl();
  if(!restored) renderRoleSelect();
})();
</script>
